<script type="module">
  // Import the functions you need from the SDKs you need
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
  import { getAuth, signInWithPopup, GoogleAuthProvider } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

  // Configurações do Firebase
  const firebaseConfig = {
    apiKey: "AIzaSyA_FWEJkeYWdeZKf3fufbyOJKxKcFdcGZ8",
    authDomain: "appteste-b900d.firebaseapp.com",
    projectId: "appteste-b900d",
    storageBucket: "appteste-b900d.firebasestorage.app",
    messagingSenderId: "615920218837",
    appId: "1:615920218837:web:94c0531276b9315a67285c",
    measurementId: "G-2Z72RVRE5Z"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // Função para autenticar com backend
  async function authenticateWithBackend(idToken, user) {
    try {
      const response = await fetch('/auth/firebase', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ idToken })
      });

      const data = await response.json();

      if (data.success) {
        console.log('Usuário autenticado com sucesso!', data.user);
        // Redirecionar para página de boas-vindas
        window.location.href = '/welcome.html';
      } else {
        console.error('Erro na autenticação:', data.error);
        alert('Erro ao autenticar: ' + data.error);
      }
    } catch (error) {
      console.error('Erro ao comunicar com o backend:', error);
      alert('Erro ao autenticar com o servidor');
    }
  }

  // Login com Google
  document.getElementById('googleLogin').addEventListener('click', async () => {
    const provider = new GoogleAuthProvider();
    try {
      const result = await signInWithPopup(auth, provider);
      const user = result.user;
      const idToken = await user.getIdToken();
      console.log('Login com Google bem-sucedido:', user);
      await authenticateWithBackend(idToken, user);
    } catch (error) {
      console.error('Erro no login com Google:', error);
      alert('Erro ao fazer login com Google: ' + error.message);
    }
  });
</script>
